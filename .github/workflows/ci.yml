name: CI

on:
  push:
    branches: [ main, trunk, develop ]
  pull_request:
    branches: [ main, trunk, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.4"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: |
        go mod download
        go mod verify

    - name: Run go fmt
      run: |
        echo "Checking code formatting..."
        output=$(go fmt ./...)
        if [ -n "$output" ]; then
          echo "The following files are not formatted:"
          echo "$output"
          exit 1
        fi
        echo "Code formatting is correct"

    - name: Run go vet
      run: |
        echo "Running go vet..."
        go vet ./...

    - name: Run tests
      run: |
        echo "Running tests..."
        go test ./... -v -race -coverprofile=coverage.out

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        fail_ci_if_error: false

  build:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25.4"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: go mod download

    - name: Build binary
      run: |
        echo "Building libro..."
        go build -o libro cmd/libro/main.go

    - name: Test binary
      run: |
        echo "Testing binary..."
        ./libro --help
      shell: bash
