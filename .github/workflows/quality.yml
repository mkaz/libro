name: Code Quality

on:
  push:
    branches: [ main, trunk, develop ]
  pull_request:
    branches: [ main, trunk, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.25.4"

    - name: Install dependencies
      run: go mod download

    - name: Check code formatting
      run: |
        echo "Checking code formatting with go fmt..."
        output=$(go fmt ./...)
        if [ -n "$output" ]; then
          echo "Code formatting issues found in:"
          echo "$output"
          echo "Run 'go fmt ./...' to fix them."
          exit 1
        fi
        echo "Code formatting is correct"

    - name: Run go vet
      run: |
        echo "Running go vet..."
        go vet ./...
        if [ $? -ne 0 ]; then
          echo "Go vet found issues. Fix them before committing."
          exit 1
        fi
        echo "No issues found by go vet"

    - name: Run tests
      run: |
        echo "Running test suite..."
        go test ./... -v
        if [ $? -ne 0 ]; then
          echo "Tests failed. Run 'go test ./...' locally to debug."
          exit 1
        fi
        echo "All tests passed"

    - name: Check for common mistakes
      run: |
        echo "Checking for common Go mistakes..."
        go install honnef.co/go/tools/cmd/staticcheck@latest
        staticcheck ./...
        echo "No issues found"
